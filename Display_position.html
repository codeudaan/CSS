<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        .Cards {
            border: 3px solid black;
            width: 120px;
            height: 120px;
            display: inline-block;
            margin: 15px;
            background-color: khaki;
            color: brown;
            text-align: center;
        }
        .container{
            height: 1080px;
        }
        #card-2 {
            position: fixed;
            right: 120px;
            bottom: 100px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="Cards" id="card-1">Card-1</div>
        <div class="Cards" id="card-2">Card-2</div>
        <div class="Cards" id="card-3">Card-3</div>
        <!-- It defines how the  Html elements are placed in a webpage.. -->
    </div>
</body>

</html>
